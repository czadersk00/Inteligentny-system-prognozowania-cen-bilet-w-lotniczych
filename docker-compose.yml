services:
  db:
    image: postgres:15
    container_name: flight-price-db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: flight_predictor
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  ml-service:
    build:
      context: ./ml-service
    container_name: flight-ml-service
    ports:
      - "8000:8000"

  backend:
    build:
      context: ./backend
    container_name: flight-backend
    env_file:
      - .env
    environment:
      PORT: 3000
      ML_SERVICE_URL: http://ml-service:8000
    ports:
      - "3000:3000"
    depends_on:
      - ml-service
      - db

  frontend:
    build:
      context: ./frontend
    container_name: flight-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
    depends_on:
      - backend

volumes:
  pg_data:
